<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />

    <title>Duplicati Login</title>

    <script type="text/javascript" src="login/jquery-2.0.3.min.js"></script>
    <script type="text/javascript" src="login/login.js?v=2.0.0.7"></script>
    <link rel="stylesheet" type="text/css" href="login/login.css?v=2.0.0.7" />

    <script
      type="text/javascript"
      src="oem/root/login/oem.js?v=2.0.0.7"
    ></script>
    <link
      rel="stylesheet"
      type="text/css"
      href="oem/root/login/oem.css?v=2.0.0.7"
    />
    <style>
      #sso-section { margin-top: 12px; }
      #sso-login-button {
        display: inline-block;
        padding: 8px 16px;
        background: #0078d4;
        color: #fff;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 14px;
        text-decoration: none;
      }
      #sso-login-button:hover { background: #106ebe; }
      .sso-divider { margin: 10px 0; color: #888; font-size: 12px; }
    </style>
  </head>

  <body>
    <div id="login">
      <h2>Duplicati</h2>
      <form id="login-form" method="POST">
        <fieldset>
          <p><label for="login-password">Password</label></p>
          <p>
            <input
              type="password"
              id="login-password"
              placeholder="password"
              autofocus
            />
          </p>

          <p><input type="submit" id="login-button" value="Sign In" /></p>
        </fieldset>
      </form>
      <div id="sso-section" style="display:none">
        <div class="sso-divider">— or —</div>
        <a id="sso-login-button" href="./api/v1/auth/entra/authorize">Sign in with Microsoft</a>
      </div>
      <div>
        <a
          href="https://docs.duplicati.com/detailed-descriptions/duplicati-access-password"
          target="_blank"
          class="helplink"
          >Password missing or lost?</a
        >
      </div>
      <div id="no-js-warning" class="nojs">
        You need Javascript enabled to use this page, or copy in the token from
        the URL
      </div>
    </div>
  </body>
</html>
